<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Translate Minimal - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { max-width: 600px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; color: #1f2937; }
    h2 { font-size: 22px; margin-bottom: 24px; }
    .section { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .section h3 { font-size: 15px; margin-bottom: 16px; color: #374151; }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
    .field input, .field select { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; background: #fff; outline: none; }
    .field input:focus, .field select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .field .help { font-size: 11px; color: #9ca3af; margin-top: 3px; }
    .saved { position: fixed; top: 20px; right: 20px; background: #10b981; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h2>⚙ Translate Minimal Settings</h2>

  <div class="section">
    <h3>Ollama</h3>
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="ollamaUrl" placeholder="http://localhost:11434">
    </div>
    <div class="field">
      <label>Model</label>
      <div style="display:flex; gap:6px;">
        <select id="ollamaModel" style="flex:1;"></select>
        <button type="button" id="ollamaRefresh" style="padding:6px 12px; border:1px solid #d1d5db; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; white-space:nowrap;" title="Refresh model list">⟳</button>
      </div>
      <div class="help" id="ollamaModelHelp">Fetching models from Ollama…</div>
    </div>
  </div>

  <div class="section">
    <h3>Poe</h3>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="poeApiKey" placeholder="Enter your Poe API Key">
      <div class="help">Get your API key from <a href="https://poe.com/api_key" target="_blank" style="color:#3b82f6;text-decoration:none;">poe.com/api_key</a></div>
    </div>
    <div class="field">
      <label>Model</label>
      <input type="text" id="poeModel" placeholder="gpt-5.3-codex">
      <div class="help">e.g. gpt-5.3-codex, Claude-3.5-Sonnet, Gemini-2-Flash</div>
    </div>
  </div>

  <div class="saved" id="toast">Saved ✓</div>

  <script src="options.js"></script>
</body>
</html>

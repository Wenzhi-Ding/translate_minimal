<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; color: #1f2937; }
    h3 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .row { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
    select { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; background: #fff; color: #1f2937; cursor: pointer; outline: none; }
    select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 8px; line-height: 1.5; }
    .hint a { color: #3b82f6; text-decoration: none; }
    .divider { height: 1px; background: #e5e7eb; margin: 12px 0; }
  </style>
</head>
<body>
  <h3>🌐 Translate Minimal</h3>
  <div class="row">
    <label>Translation Service</label>
    <select id="service">
      <option value="google">Google Translate</option>
      <option value="microsoft">Microsoft Translate</option>
      <option value="ollama">Ollama (translategemma)</option>
      <option value="poe">Poe</option>
    </select>
  </div>
  <div class="row">
    <label>Target Language</label>
    <select id="targetLang">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="ru">Русский</option>
      <option value="pt">Português</option>
      <option value="it">Italiano</option>
      <option value="ar">العربية</option>
      <option value="th">ไทย</option>
      <option value="vi">Tiếng Việt</option>
    </select>
  </div>
  <div class="row">
    <label>Source Language</label>
    <select id="sourceLang">
      <option value="auto">Auto Detect</option>
      <option value="en">English</option>
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="ru">Русский</option>
    </select>
  </div>
  <div class="divider"></div>
  <div class="hint">
    Hold <b>Ctrl</b> + hover over text to translate.<br>
    <a href="options.html" id="openOptions">Settings →</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
